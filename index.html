<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do App</title>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
    <h1>📝 To-Do Web</h1>

    <div class="stats-container">
        <div class="stat-card">
            <h3>📋 Total Tasks</h3>
            <p id="taskCount">0</p>
        </div>
    
        <div class="stat-card">
            <h3>✅ Completed</h3>
            <p id="completeCount">0</p>
        </div>

        <div class="stat-card">
            <h3>⏳ Pending</h3>
            <p id="pendingCount">0</p>
        </div>
    </div>
    <div class="input-box">
        <input
            type="text"
            id="taskInput"
            placeholder="Enter your task">
    
        <button id="btn">Add</button>
    </div>

    <div id="taskList"></div>
    <P id="emptyMessage">No tasks yet 😊</P>

    </div>
    <script src="script.js"></script>
    
</body>
</html>
